<!doctype html>
<html lang="mn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Гэр бүлийн санхүү | Данс</title>
    <meta name="theme-color" content="#0f8f67" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Noto+Sans+Display:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body class="antialiased">
    <div class="min-h-screen lg:flex">
      <aside class="hidden lg:flex lg:w-72 xl:w-80 p-5">
        <div class="card w-full p-5 flex flex-col gap-6">
          <header>
            <p class="text-xs uppercase tracking-[0.2em] text-slate-500">Гэр бүлийн төсөв</p>
            <h1 class="font-display text-2xl font-semibold">Гэр бүлийн санхүү</h1>
          </header>
          <nav class="space-y-2">
            <a class="sidebar-link" href="./dashboard.html">Тойм</a>
            <a class="sidebar-link active" href="./accounts.html">Данс</a>
            <a class="sidebar-link" href="./transactions.html">Гүйлгээ</a>
            <a class="sidebar-link" href="./categories.html">Ангилал</a>
          </nav>
          <div class="mt-auto space-y-3">
            <p id="currentUserEmail" class="text-xs text-slate-500 break-all"></p>
            <button id="logoutBtn" class="btn btn-neutral w-full">Гарах</button>
          </div>
        </div>
      </aside>

      <main class="flex-1 page-main p-4 lg:p-8 space-y-6">
        <header class="card p-5 flex items-center justify-between gap-3">
          <div>
            <h2 class="font-display text-2xl font-semibold">Данс удирдах</h2>
          </div>
        </header>

        <section class="card p-5">
          <header class="mb-3">
            <h3 class="font-display text-lg font-semibold">Дансны жагсаалт</h3>
          </header>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Bank</th>
                  <th>Aktueller Stand</th>
                </tr>
              </thead>
              <tbody id="accountsTableBody"></tbody>
            </table>
          </div>
        </section>

        <div class="fab-actions">
          <button id="toggleDeleteAccountModeBtn" type="button" class="fab-btn fab-btn-danger" aria-label="Устгах горим">
            УСТ
          </button>
          <button id="openAccountModalBtn" type="button" class="fab-btn" aria-label="Данс нэмэх">+</button>
        </div>

        <div id="accountModal" class="app-modal hidden" role="dialog" aria-modal="true" aria-labelledby="accountModalTitle">
          <div class="app-modal-card">
            <header class="flex items-center justify-between gap-3 mb-4">
              <h3 id="accountModalTitle" class="font-display text-lg font-semibold">Данс нэмэх</h3>
              <button id="closeAccountModalBtn" type="button" class="modal-close-btn" aria-label="Хаах">×</button>
            </header>
            <form id="accountForm" class="space-y-3">
              <label class="space-y-1 block">
                <span class="text-sm font-semibold">Нэр</span>
                <input class="form-input" id="accountName" required placeholder="Үндсэн данс" />
              </label>
              <label class="space-y-1 block">
                <span class="text-sm font-semibold">Эхний үлдэгдэл</span>
                <input class="form-input" id="accountInitialBalance" type="number" step="0.01" inputmode="decimal" value="0" required />
              </label>
              <button class="btn btn-primary w-full" type="submit">Данс хадгалах</button>
            </form>
          </div>
        </div>
      </main>
    </div>

    <nav class="lg:hidden fixed bottom-0 inset-x-0 z-40 border-t border-emerald-100 bg-white/95 backdrop-blur">
      <div class="max-w-md mx-auto grid grid-cols-4 px-2 py-2 gap-1">
        <a href="./dashboard.html" class="mobile-link">Тойм</a>
        <a href="./transactions.html" class="mobile-link">Гүйлгээ</a>
        <a href="./accounts.html" class="mobile-link active">Данс</a>
        <a href="./categories.html" class="mobile-link">Ангилал</a>
      </div>
    </nav>

    <script type="module">
      import { initAccountsPage } from "./js/accounts.js";
      initAccountsPage();
    </script>
  </body>
</html>
