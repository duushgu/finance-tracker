<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Familien-Finanzen | Konten</title>
    <meta name="theme-color" content="#0f8f67" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body class="antialiased">
    <div class="min-h-screen lg:flex">
      <aside class="hidden lg:flex lg:w-72 xl:w-80 p-5">
        <div class="card w-full p-5 flex flex-col gap-6">
          <header>
            <p class="text-xs uppercase tracking-[0.2em] text-slate-500">Familien-Kasse</p>
            <h1 class="font-display text-2xl font-semibold">Familien-Finanzplan</h1>
          </header>
          <nav class="space-y-2">
            <a class="sidebar-link" href="./dashboard.html">Überblick</a>
            <a class="sidebar-link active" href="./accounts.html">Konten</a>
            <a class="sidebar-link" href="./transactions.html">Buchungen</a>
            <a class="sidebar-link" href="./categories.html">Kategorien</a>
          </nav>
          <div class="mt-auto space-y-3">
            <p id="currentUserEmail" class="text-xs text-slate-500 break-all"></p>
            <button id="logoutBtn" class="btn btn-neutral w-full">Abmelden</button>
          </div>
        </div>
      </aside>

      <main class="flex-1 page-main p-4 lg:p-8 space-y-6">
        <header class="card p-5 flex items-center justify-between gap-3">
          <div>
            <p class="text-sm text-slate-500">Konten</p>
            <h2 class="font-display text-2xl font-semibold">Konten verwalten</h2>
          </div>
        </header>

        <section class="card p-5">
          <h3 class="font-display text-lg font-semibold mb-4">Konto anlegen</h3>
          <form id="accountForm" class="grid grid-cols-1 md:grid-cols-3 gap-3">
            <label class="space-y-1">
              <span class="text-sm font-semibold">Name</span>
              <input class="form-input" id="accountName" required placeholder="Hauptkonto" />
            </label>
            <label class="space-y-1">
              <span class="text-sm font-semibold">Startguthaben</span>
              <input class="form-input" id="accountInitialBalance" type="number" step="0.01" inputmode="decimal" value="0" required />
            </label>
            <div class="flex items-end">
              <button class="btn btn-primary w-full" type="submit">+ Konto speichern</button>
            </div>
          </form>
        </section>

        <section class="card p-5">
          <header class="mb-3">
            <h3 class="font-display text-lg font-semibold">Kontenübersicht</h3>
            <p class="text-sm text-slate-500">Kontostände werden automatisch aus Buchungen berechnet.</p>
          </header>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Bank</th>
                  <th>Aktueller Stand</th>
                </tr>
              </thead>
              <tbody id="accountsTableBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <nav class="lg:hidden fixed bottom-0 inset-x-0 z-40 border-t border-emerald-100 bg-white/95 backdrop-blur">
      <div class="max-w-md mx-auto grid grid-cols-4 px-2 py-2 gap-1">
        <a href="./dashboard.html" class="mobile-link">Start</a>
        <a href="./transactions.html" class="mobile-link">Buchung</a>
        <a href="./accounts.html" class="mobile-link active">Konten</a>
        <a href="./categories.html" class="mobile-link">Kategorien</a>
      </div>
    </nav>

    <script type="module">
      import { initAccountsPage } from "./js/accounts.js";
      initAccountsPage();
    </script>
  </body>
</html>
